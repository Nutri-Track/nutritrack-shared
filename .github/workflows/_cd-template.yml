name: CD — Update Helm Chart

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Name of the service key in values.yaml (e.g., authService, foodService, frontend)"
      image-tag:
        required: true
        type: string
        description: "New image tag to update in values.yaml"
      branch:
        required: true
        type: string
        description: "Target branch (main/develop)"
      environment:
        required: true
        type: string
        description: "Target environment (production/development)"
    secrets:
      HELM_REPO_PAT:
        required: true
        description: "PAT with push access to nutritrack-charts repo"

jobs:
  update-chart:
    name: "CD: Update ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Charts Repository
        uses: actions/checkout@v4
        with:
          repository: Nutri-Track/nutritrack-charts
          token: ${{ secrets.HELM_REPO_PAT }}
          path: charts
          ref: ${{ inputs.branch }}

      - name: Setup yq
        uses: mikefarah/yq@v4.44.1

      - name: Update image tag
        run: |
          FILE="charts/values.yaml"
          if [ -f "$FILE" ]; then
            echo "Updating $FILE for service ${{ inputs.service-name }} with tag ${{ inputs.image-tag }}"
            # Target the specific service block in values.yaml (e.g., .authService.image.tag)
            yq -i ".${{ inputs.service-name }}.image.tag = \"${{ inputs.image-tag }}\"" "$FILE"
          else
            echo "::error::File not found: $FILE"
            exit 1
          fi

      - name: Validate values.yaml
        run: |
          yq eval '.' "charts/values.yaml" > /dev/null

      - name: Commit and Push changes
        run: |
          cd charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the unified values file
          git add values.yaml
          
          if git diff --staged --quiet; then
            echo "No changes detected in values.yaml (tag might already be up to date)"
          else
            git commit -m "cd: update ${{ inputs.service-name }} image tag to ${{ inputs.image-tag }} [${{ inputs.branch }}]"
            git push origin ${{ inputs.branch }}
          fi
